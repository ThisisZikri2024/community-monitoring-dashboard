<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titan EMS v13.0 | Pro Security Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #0f172a; --accent: #2563eb; --success: #10b981; --danger: #ef4444;
            --warning: #f59e0b; --purple: #9333ea; --bg: #f8fafc; --card: #ffffff;
            --border: #e2e8f0; --text: #1e293b; --text-light: #64748b; --radius: 12px;
        }

        /* DARK MODE VARIABLES */
        .dark-mode {
            --bg: #020617; --card: #0f172a; --border: #1e293b; --text: #f1f5f9; --text-light: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background-color: var(--bg); color: var(--text); transition: 0.3s; }

        /* LOGIN SCREEN */
        #login-screen { position: fixed; inset: 0; background: var(--primary); z-index: 9999; display: flex; align-items: center; justify-content: center; flex-direction: column; color: white; }
        .pin-box { background: rgba(255,255,255,0.1); padding: 40px; border-radius: 20px; text-align: center; backdrop-filter: blur(10px); }

        /* MAIN LAYOUT */
        .app-container { display: flex; height: 100vh; width: 100%; overflow: hidden; }
        .sidebar { width: 280px; background: var(--primary); color: white; display: flex; flex-direction: column; }
        .sidebar-header { padding: 30px 24px; font-size: 1.5rem; font-weight: 800; color: var(--accent); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .nav-item { padding: 14px 24px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: #94a3b8; transition: 0.2s; border-left: 4px solid transparent; }
        .nav-item.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--accent); }

        .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        header { height: 80px; background: var(--card); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 40px; }
        .content { flex: 1; padding: 40px; overflow-y: auto; }

        /* COMPONENTS */
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
        .card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; }
        
        /* TABLE & RISK COLORS */
        table { width: 100%; border-collapse: collapse; }
        th { padding: 16px 24px; background: rgba(0,0,0,0.02); font-size: 0.75rem; text-transform: uppercase; color: var(--text-light); text-align: left; }
        td { padding: 16px 24px; border-bottom: 1px solid var(--border); }
        
        .risk-high { border-left: 5px solid var(--danger); }
        .risk-medium { border-left: 5px solid var(--warning); }
        .risk-low { border-left: 5px solid var(--success); }

        .avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        
        /* FORMS & BUTTONS */
        .form-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg); color: var(--text); outline: none; margin-bottom: 15px; }
        .btn { padding: 12px 20px; border-radius: 8px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; gap: 8px; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text); }
        
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 1000; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 550px; border-radius: var(--radius); padding: 30px; }

        .d-none { display: none !important; }
    </style>
</head>
<body class="">

    <div id="login-screen">
        <div class="pin-box">
            <h2 style="margin-bottom: 10px;">🛡️ TITAN SECURITY</h2>
            <p style="margin-bottom: 20px; opacity: 0.7;">Sila masukkan PIN Pentadbir</p>
            <input type="password" id="admin-pin" class="form-input" style="text-align: center; font-size: 1.5rem; letter-spacing: 5px;" maxlength="4" placeholder="****">
            <button class="btn btn-primary" style="width: 100%" onclick="verifyPin()">Akses Sistem</button>
            <p style="margin-top: 15px; font-size: 0.7rem; opacity: 0.5;">Hint: 1234</p>
        </div>
    </div>

    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">TITAN<span>EMS</span></div>
            <nav style="flex: 1; padding: 20px 0;">
                <div class="nav-item active" onclick="switchTab('dashboard')">📊 Dashboard</div>
                <div class="nav-item" onclick="switchTab('register')">📝 Pendaftaran</div>
                <div class="nav-item" onclick="switchTab('audit')">🛡️ Arkib Arkib</div>
            </nav>
            <div style="padding: 20px;">
                <button class="btn btn-outline" style="width: 100%; color: white;" onclick="toggleDarkMode()">🌓 Tukar Mod</button>
            </div>
        </aside>

        <main class="main">
            <header>
                <h2 id="page-title">Dashboard Utama</h2>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-primary" onclick="exportCSV()">📥 Export CSV</button>
                    <button class="btn btn-outline" onclick="location.reload()">🔒 Logout</button>
                </div>
            </header>

            <div class="content">
                <div id="tab-dashboard">
                    <div class="stats">
                        <div class="stat-card"><h4>Profil</h4><p id="s-total">0</p></div>
                        <div class="stat-card"><h4>Kanak-Kanak</h4><p id="s-kids">0</p></div>
                        <div class="stat-card"><h4>Risiko Tinggi</h4><p id="s-high" style="color:var(--danger)">0</p></div>
                    </div>

                    <div class="card">
                        <div style="padding: 20px; border-bottom: 1px solid var(--border);">
                            <input type="text" id="search" class="form-input" placeholder="Cari subjek..." style="max-width:300px; margin:0" onkeyup="render()">
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Subjek</th>
                                    <th>Umur/Kategori</th>
                                    <th>Risiko</th>
                                    <th>Sebab/Sekatan (Manual)</th>
                                    <th style="text-align: right">Tindakan</th>
                                </tr>
                            </thead>
                            <tbody id="userTable"></tbody>
                        </table>
                    </div>
                </div>

                <div id="tab-register" class="d-none">
                    <div class="card" style="max-width: 500px; margin: auto; padding: 30px;">
                        <h3>Daftar Ahli</h3><br>
                        <input type="text" id="regName" class="form-input" placeholder="Nama Penuh">
                        <input type="number" id="regAge" class="form-input" placeholder="Umur">
                        <select id="regRisk" class="form-input">
                            <option value="Low">Risiko Rendah</option>
                            <option value="Medium">Risiko Sederhana</option>
                            <option value="High">Risiko Tinggi</option>
                        </select>
                        <button class="btn btn-primary" style="width: 100%" onclick="addUser()">Simpan Profil</button>
                    </div>
                </div>

                <div id="tab-audit" class="d-none">
                    <div class="card">
                        <table id="auditTable">
                            <thead><tr><th>Masa</th><th>Nama</th><th>Alasan Padam</th></tr></thead>
                            <tbody id="auditBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Urus: <span id="m-name" style="color:var(--accent)"></span></h3>
            
            <label style="font-size: 0.8rem; font-weight: 700;">Status Tindakan</label>
            <select id="m-status" class="form-input" onchange="checkKids()">
                <option value="AKTIF">AKTIF</option>
                <option value="KIDS">ZON KANAK-KANAK</option>
                <option value="DISABLED">SEKAT (DISABLED)</option>
                <option value="DELETE">PADAM (ARKIB)</option>
            </select>

            <label style="font-size: 0.8rem; font-weight: 700;">Tahap Risiko</label>
            <select id="m-risk" class="form-input">
                <option value="Low">Rendah</option>
                <option value="Medium">Sederhana</option>
                <option value="High">Tinggi</option>
            </select>

            <label style="font-size: 0.8rem; font-weight: 700;">Sebab Manual (Nota)</label>
            <textarea id="m-reason" class="form-input" style="height: 80px;"></textarea>

            <div id="m-socmed" class="d-none" style="background: rgba(0,0,0,0.05); padding: 15px; border-radius: 8px;">
                <p style="font-size: 0.75rem; margin-bottom: 10px;">Sekat Media Sosial:</p>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                    <label><input type="checkbox" class="cb" value="TikTok"> TikTok</label>
                    <label><input type="checkbox" class="cb" value="Instagram"> Instagram</label>
                    <label><input type="checkbox" class="cb" value="Roblox"> Roblox</label>
                    <label><input type="checkbox" class="cb" value="YouTube"> YouTube</label>
                </div>
            </div>

            <div style="margin-top: 20px; text-align: right;">
                <button class="btn btn-outline" onclick="closeModal()">Batal</button>
                <button class="btn btn-primary" onclick="saveChange()">Simpan Data</button>
            </div>
        </div>
    </div>

    <script>
        let users = JSON.parse(localStorage.getItem('titan_v13_users')) || [];
        let audit = JSON.parse(localStorage.getItem('titan_v13_audit')) || [];
        let curId = null;

        // SECURITY PIN
        function verifyPin() {
            const pin = document.getElementById('admin-pin').value;
            if(pin === "1234") {
                document.getElementById('login-screen').style.display = 'none';
            } else {
                alert("PIN Salah! Akses ditolak.");
                document.getElementById('admin-pin').value = '';
            }
        }

        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        function render() {
            const q = document.getElementById('search').value.toLowerCase();
            const body = document.getElementById('userTable');
            body.innerHTML = '';

            users.filter(u => u.name.toLowerCase().includes(q)).forEach(u => {
                const initial = u.name.charAt(0).toUpperCase();
                const riskClass = `risk-${u.risk.toLowerCase()}`;
                const blocked = (u.blocked || []).map(b => `<span style="font-size:0.6rem; background:var(--danger); color:white; padding:2px 5px; border-radius:3px; margin-right:3px;">${b}</span>`).join('');

                body.innerHTML += `
                    <tr class="${riskClass}">
                        <td>
                            <div style="display:flex; align-items:center; gap:12px;">
                                <div class="avatar">${initial}</div>
                                <div><b>${u.name}</b><br><small>#${u.id}</small></div>
                            </div>
                        </td>
                        <td>${u.age} Thn<br><small>${u.status === 'KIDS' ? 'Kanak-Kanak' : 'Awam'}</small></td>
                        <td><span style="font-weight:800; color:var(--${u.risk === 'High' ? 'danger' : (u.risk === 'Medium' ? 'warning' : 'success')})">${u.risk}</span></td>
                        <td>
                            <div style="font-size:0.85rem;">${u.reason || '-'}</div>
                            <div style="margin-top:5px;">${blocked}</div>
                        </td>
                        <td style="text-align:right"><button class="btn btn-outline" onclick="openModal(${u.id})">Urus</button></td>
                    </tr>
                `;
            });
            updateStats();
        }

        function updateStats() {
            document.getElementById('s-total').innerText = users.length;
            document.getElementById('s-kids').innerText = users.filter(u => u.status === 'KIDS').length;
            document.getElementById('s-high').innerText = users.filter(u => u.risk === 'High').length;
        }

        function addUser() {
            const name = document.getElementById('regName').value;
            if(!name) return;
            users.unshift({
                id: Date.now().toString().slice(-6),
                name: name,
                age: document.getElementById('regAge').value,
                risk: document.getElementById('regRisk').value,
                status: 'AKTIF', reason: '', blocked: []
            });
            save(); switchTab('dashboard');
        }

        function openModal(id) {
            curId = id;
            const u = users.find(x => x.id == id);
            document.getElementById('m-name').innerText = u.name;
            document.getElementById('m-status').value = u.status;
            document.getElementById('m-risk').value = u.risk;
            document.getElementById('m-reason').value = u.reason;
            document.querySelectorAll('.cb').forEach(c => c.checked = u.blocked.includes(c.value));
            checkKids();
            document.getElementById('modal').classList.add('active');
        }

        function checkKids() {
            document.getElementById('m-socmed').classList.toggle('d-none', document.getElementById('m-status').value !== 'KIDS');
        }

        function saveChange() {
            const idx = users.findIndex(u => u.id == curId);
            const st = document.getElementById('m-status').value;
            const re = document.getElementById('m-reason').value;

            if(st === 'DELETE') {
                audit.unshift({ time: new Date().toLocaleString(), name: users[idx].name, reason: re });
                users.splice(idx, 1);
            } else {
                users[idx].status = st;
                users[idx].risk = document.getElementById('m-risk').value;
                users[idx].reason = re;
                users[idx].blocked = Array.from(document.querySelectorAll('.cb:checked')).map(c => c.value);
            }
            save(); closeModal();
        }

        function switchTab(t) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            document.getElementById('tab-dashboard').classList.add('d-none');
            document.getElementById('tab-register').classList.add('d-none');
            document.getElementById('tab-audit').classList.add('d-none');
            document.getElementById('tab-'+t).classList.remove('d-none');
            if(t === 'audit') {
                document.getElementById('auditBody').innerHTML = audit.map(a => `<tr><td>${a.time}</td><td>${a.name}</td><td>${a.reason}</td></tr>`).join('');
            }
        }

        function exportCSV() {
            let csv = "ID,Nama,Umur,Risiko,Status,Sebab\n";
            users.forEach(u => csv += `${u.id},${u.name},${u.age},${u.risk},${u.status},"${u.reason}"\n`);
            const blob = new Blob([csv], {type:'text/csv'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'Titan_Report.csv';
            a.click();
        }

        function save() {
            localStorage.setItem('titan_v13_users', JSON.stringify(users));
            localStorage.setItem('titan_v13_audit', JSON.stringify(audit));
            render();
        }
        function closeModal() { document.getElementById('modal').classList.remove('active'); }
        render();
    </script>
</body>
</html>
